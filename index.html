<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal Beauty Assistant</title>

    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      
      <!------- header and branding areaaaaaauhhhhhhhhhhh------->
      <header class="site-header">
        <img src="loreal-logo.png" alt="L'Oréal Logo" class="logo" />
        <h1 class="site-title">L'Oréal Beauty Assistant</h1>
      </header>

      <!------- my chat areaaaaaaaa------->
      <main>
        <section class="chatbox">

          <!-- the latest question for extra credit -->
          <div id="latestQuestion" class="latest-question"></div>

          <!-- chat messages -->
          <div id="chatWindow" class="chat-window">
            <!--it will come here through js -->
          </div>

          <!-- input area -->
          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about L'Oréal products or routines…"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <!------- my footer ------->
      <footer class="site-footer">
        <p>&copy; 2025 L'Oréal Assistant Project</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>

    </div>

    <!-- i need to delete this later when i have my cloudfare worker -->
    <script src="secrets.js"></script>

    <script src="script.js"></script>
  </body>
</html>
